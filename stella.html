<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stella Turns One 🎂</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: "Comic Sans MS", cursive;
  text-align: center;
}

/* Background */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('stella.PNG') no-repeat center center/cover;
  filter: brightness(0.85);
}

/* Soft glow overlay */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(255,192,203,0.25), rgba(0,0,0,0.45));
}

/* Title */
.title {
  position: absolute;
  top: 6vh;
  width: 100%;
  font-size: 2em;
  color: white;
  text-shadow: 0 0 8px hotpink;
}

/* Message */
.message {
  position: absolute;
  top: 32vh;
  width: 100%;
  font-size: 1.6em;
  color: white;
  opacity: 0;
  transition: opacity 1.2s ease;
}

/* Cake */
.cake {
  position: absolute;
  bottom: 22vh;
  left: 50%;
  transform: translateX(-50%);
  width: 180px;
  height: 100px;
  background: #ffb6c1;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

/* Candle */
.candle {
  position: absolute;
  width: 8px;
  height: 35px;
  background: white;
  top: -35px;
}

/* Flame */
.flame {
  width: 8px;
  height: 12px;
  background: orange;
  border-radius: 50%;
  margin-top: -12px;
  animation: flicker 0.2s infinite;
  transition: opacity 0.5s ease-out;
}

@keyframes flicker {
  0% { transform: scale(1); }
  100% { transform: scale(1.2); }
}

/* Puff animation */
.puff {
  position: absolute;
  width: 20px;
  height: 20px;
  background: white;
  border-radius: 50%;
  opacity: 0.6;
  animation: puff 0.6s ease-out forwards;
}

@keyframes puff {
  0% { transform: scale(0.2); opacity: 0.6; }
  100% { transform: scale(2.5); opacity: 0; }
}

/* Button */
.button {
  position: absolute;
  bottom: 12vh;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 22px;
  font-size: 1em;
  background: hotpink;
  border: none;
  border-radius: 25px;
  color: white;
  box-shadow: 0 0 15px hotpink;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="title">
🎉 Stella Turns ONE 🎉<br>
April 28 💖
</div>

<div class="message" id="message">
We love you Stella 💕
</div>

<div class="cake">
  <div class="candle" style="left: 30px;"><div class="flame"></div></div>
  <div class="candle" style="left: 80px;"><div class="flame"></div></div>
  <div class="candle" style="left: 130px;"><div class="flame"></div></div>
</div>

<button class="button" onclick="blowCandles()">Blow Candles 🎂</button>

<audio id="song" src="tiny_shoes.mp3"></audio>

<script>
function blowCandles() {
  const flames = document.querySelectorAll('.flame');
  const song = document.getElementById("song");

  // fade flames
  flames.forEach(f => f.style.opacity = 0);

  // puff effect
  flames.forEach(f => {
    const puff = document.createElement("div");
    puff.className = "puff";
    puff.style.left = f.getBoundingClientRect().left + "px";
    puff.style.top = f.getBoundingClientRect().top + "px";
    document.body.appendChild(puff);
    setTimeout(() => puff.remove(), 700);
  });

  // show message
  document.getElementById("message").style.opacity = 1;

  // play song (safe for iOS)
  if (song.paused) song.play();
}

/* Mic blow detection */
navigator.mediaDevices?.getUserMedia({ audio: true })
.then(stream => {
  const audioContext = new AudioContext();
  const mic = audioContext.createMediaStreamSource(stream);
  const analyser = audioContext.createAnalyser();
  mic.connect(analyser);

  const data = new Uint8Array(analyser.frequencyBinCount);

  function checkBlow() {
    analyser.getByteFrequencyData(data);
    let volume = data.reduce((a,b) => a+b) / data.length;

    if (volume > 60) {
      blowCandles();
    }

    requestAnimationFrame(checkBlow);
  }

  checkBlow();
})
.catch(() => {});
</script>

</body>
</html>
