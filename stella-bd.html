<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/PNG" href="https://maximumreality.github.io/lunaverse/stella.PNG">
<link rel="apple-touch-icon" href="https://maximumreality.github.io/lunaverse/stella.PNG">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stella Turns One 🎂</title>

<!-- Bubble-letter style font -->
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: "Lilita One", sans-serif;
  text-align: center;
}

.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('IMG_8513.png') no-repeat center center/cover;
  filter: brightness(0.9);
}

/* Glow overlay */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(255,192,203,0.25), rgba(0,0,0,0.45));
}

/* Title */
.title {
  position: absolute;
  top: 6vh;
  width: 100%;
  font-size: 2.4em;
  color: white;
  text-shadow:
    0 0 8px hotpink,
    0 0 15px hotpink,
    0 0 25px white;
}

/* Message */
.message {
  position: absolute;
  top: 32vh;
  width: 100%;
  font-size: 1.8em;
  color: white;
  opacity: 0;
  transition: opacity 1.2s ease;
  text-shadow: 0 0 10px pink;

}



.flame {
  position: absolute;
  top: 63%; /* tweak until it aligns visually */
  left: 50%;
  width: 12px;
  height: 18px;
  background: radial-gradient(circle at 50% 20%, #ffcc33, #ff6600 70%, transparent 80%);
  border-radius: 50%;
  animation: flicker 0.2s infinite alternate;
  transform: translateX(-50%);
  box-shadow: 0 0 15px 5px rgba(255, 150, 0, 0.6);
  transition: opacity 0.5s ease-out;
}

@keyframes flicker {
  0% { transform: translateX(-50%) scale(1); opacity: 0.9; }
  100% { transform: translateX(-50%) scale(1.2); opacity: 1; }
}


/* Puff animation */
.puff {
  position: absolute;
  width: 20px;
  height: 20px;
  background: white;
  border-radius: 50%;
  opacity: 0.6;
  animation: puff 0.6s ease-out forwards;
}

@keyframes puff {
  0% { transform: scale(0.2); opacity: 0.6; }
  100% { transform: scale(2.5); opacity: 0; }
}
  @keyframes pulse {
  0% { transform: translateX(-50%) scale(1); }
  50% { transform: translateX(-50%) scale(1.05); }
  100% { transform: translateX(-50%) scale(1); }
}

/* Button */
.button {
  position: absolute;
  bottom: 12vh;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 22px;
  font-size: 1.1em;
  background: hotpink;
  border: none;
  border-radius: 25px;
  color: white;
  box-shadow: 0 0 15px hotpink;
  animation: pulse 2s infinite ease-in-out;
}
  /* Confetti container */
.confetti {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
  top: 0;
  left: 0;
}

/* Sparkles */
.sparkle {
  position: absolute;
  font-size: 14px;
  animation: fall 3s linear forwards;
  opacity: 0.9;
}

/* Falling animation */
@keyframes fall {
  0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
}

.button, .flame {
  touch-action: manipulation;
  cursor: pointer;
}


</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>
<div class="confetti" id="confetti"></div>  

<div class="title">
🎉 Stella Turns ONE 🎉<br>
April 28 💖
</div>

<div class="message" id="message">
We love you Stella 💕
</div>


    
    <div class="flame" onclick="blowCandles()"></div>
  </div>
</div>

<button class="button" onclick="blowCandles()">Blow Candle 🎂</button>

<audio id="song" src="tiny_shoes.mp3"></audio>


<script>
function makeSparkle() {
  let s = document.createElement("div");
  s.className = "sparkle";
  s.textContent = "⭐️";
  s.style.left = Math.random() * 100 + "vw";
  s.style.fontSize = (12 + Math.random() * 10) + "px";
  s.style.animationDuration = (2 + Math.random() * 3) + "s";
  document.getElementById("confetti").appendChild(s);

  setTimeout(() => s.remove(), 4000);
}


let candleLit = true;

function blowCandles() {
  const flame = document.querySelector('.flame');
  const song = document.getElementById("song");

  if (candleLit) {
    // blow out
    flame.style.opacity = 0;
    candleLit = false;

    // puff
    const rect = flame.getBoundingClientRect();
    const puff = document.createElement("div");
    puff.className = "puff";
    puff.style.left = rect.left + "px";
    puff.style.top = rect.top + "px";
    document.body.appendChild(puff);
    setTimeout(() => puff.remove(), 700);

    // show message
    document.getElementById("message").style.opacity = 1;

    // confetti burst
    for (let i = 0; i < 40; i++) makeSparkle();

    if (song.paused) song.play();

  } else {
    // re-light
    flame.style.opacity = 1;
    candleLit = true;

    // hide message again if you want
    // document.getElementById("message").style.opacity = 0;
  }
}


/* Continuous gentle confetti */
setInterval(() => {
  makeSparkle();
}, 300);
</script>

</body>
</html>
